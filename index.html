<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLIGRAM PRO UNLIMITED</title>
    <style>
        :root {
            --bg: #0b0d10;
            --surface: #1c1f26;
            --primary: #00d26a;
            --text: #ffffff;
            --text-dim: #949ba4;
            --border: #2f333d;
            --accent: #23272e;
            --danger: #ff4d4d;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            position: fixed;
        }

        /* --- Screens --- */
        .screen { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg); 
            z-index: 10; 
            transition: opacity 0.3s ease;
        }
        .hidden { display: none !important; }

        /* --- Header --- */
        header { 
            height: 64px; 
            padding: 0 16px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            background: var(--surface); 
            justify-content: space-between; 
            flex-shrink: 0;
            z-index: 20;
        }
        header h1 { 
            font-size: 22px; 
            color: var(--primary); 
            font-weight: 900; 
            letter-spacing: -0.5px;
        }

        /* --- Layout Elements --- */
        .container { 
            padding: 20px; 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
        }
        
        .card { 
            background: var(--surface); 
            padding: 24px; 
            border-radius: 28px; 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid var(--border);
            box-shadow: 0 12px 40px var(--shadow);
        }

        /* --- Forms & Inputs --- */
        textarea, .input-text { 
            width: 100%; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            border-radius: 14px; 
            margin: 10px 0; 
            outline: none; 
            font-size: 14px; 
            resize: none;
            transition: border-color 0.2s;
        }
        textarea:focus, .input-text:focus {
            border-color: var(--primary);
        }
        textarea { height: 100px; font-family: monospace; font-size: 11px; }
        
        /* --- Buttons --- */
        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            transition: 0.2s; 
            margin-top: 8px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .btn-secondary { background: var(--accent); color: #fff; border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: #fff; }

        .instruction { 
            font-size: 13px; 
            color: var(--text-dim); 
            margin-bottom: 20px; 
            line-height: 1.6; 
            background: rgba(0,0,0,0.2); 
            padding: 16px; 
            border-radius: 14px; 
            border-left: 4px solid var(--primary); 
        }

        /* --- Chat List --- */
        .chat-item { 
            padding: 18px 16px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--bg); 
            cursor: pointer; 
            width: 100%;
        }
        .chat-item:active { background: var(--surface); }
        .chat-info { display: flex; flex-direction: column; gap: 4px; }
        .chat-name { font-weight: bold; color: #fff; font-size: 17px; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #333; transition: 0.3s; }
        .status-dot.online { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        
        .empty-list { color: var(--text-dim); text-align: center; margin-top: 60px; font-size: 15px; }

        /* --- Messages Area --- */
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background-image: radial-gradient(circle at 2px 2px, var(--border) 1px, transparent 0);
            background-size: 24px 24px;
        }
        
        .bubble { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 15px; 
            line-height: 1.5; 
            position: relative;
            word-wrap: break-word; 
            overflow-wrap: break-word; 
            word-break: break-all;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .bubble.me { 
            align-self: flex-end; 
            background: var(--primary); 
            color: #000; 
            border-bottom-right-radius: 4px; 
        }
        .bubble.partner { 
            align-self: flex-start; 
            background: var(--surface); 
            color: #fff;
            border-bottom-left-radius: 4px; 
            border: 1px solid var(--border);
        }
        
        .msg-time { font-size: 10px; opacity: 0.6; text-align: right; margin-top: 6px; }

        /* --- Media Content --- */
        .media-content { 
            margin-top: 8px; 
            border-radius: 14px; 
            max-width: 100%; 
            display: block; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: #000;
        }
        .download-link { 
            font-size: 12px; 
            color: inherit; 
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px; 
            text-decoration: none; 
            font-weight: bold; 
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 8px;
        }

        /* --- Chat Input --- */
        .chat-input-bar { 
            padding: 12px 16px; 
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: var(--surface); 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            flex-shrink: 0; 
        }
        .chat-input-bar input { 
            flex: 1; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 12px 16px; 
            border-radius: 24px; 
            outline: none; 
            font-size: 15px;
        }

        .voice-btn { 
            background: var(--accent); 
            border: 1px solid var(--border); 
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; 
            cursor: pointer; 
            user-select: none; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .voice-btn.recording { 
            color: #fff; 
            background: var(--danger);
            transform: scale(1.4); 
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.4);
        }

        /* --- Progress Bar --- */
        #file-progress-container { 
            width: 100%; 
            background: var(--border); 
            height: 6px; 
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 30;
        }
        #file-progress-bar { 
            height: 100%; 
            background: var(--primary); 
            width: 0%; 
            transition: 0.1s linear; 
        }

        audio { width: 100%; min-width: 200px; height: 40px; margin-top: 8px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* --- Floating Action Button --- */
        .fab { 
            position: fixed; 
            bottom: 30px; 
            right: 24px; 
            width: 68px; 
            height: 68px; 
            border-radius: 34px; 
            background: var(--primary); 
            color: #000; 
            font-size: 36px; 
            border: none; 
            box-shadow: 0 8px 25px rgba(0, 210, 106, 0.4); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 100;
            font-weight: 300;
        }

    </style>
</head>
<body>

    <div id="screen-nick" class="screen hidden">
        <div class="container" style="justify-content: center;">
            <div class="card">
                <h1 style="color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 32px;">POLIGRAM</h1>
                <p style="text-align:center; color:var(--text-dim); margin-bottom: 20px;">Добро пожаловать в анонимный P2P чат</p>
                <input type="text" id="nick-input" class="input-text" placeholder="Придумайте никнейм..." maxlength="20">
                <button class="btn btn-primary" onclick="handleSaveNick()">ПРОДОЛЖИТЬ</button>
            </div>
        </div>
    </div>

    <div id="screen-main" class="screen hidden">
        <header>
            <h1>POLIGRAM</h1>
            <div style="display: flex; gap: 10px;">
                <button onclick="clearAllSettings()" style="background:none; border:none; color:var(--danger); font-size:12px; font-weight:bold;">СБРОС</button>
            </div>
        </header>
        <div id="chats-list-container" style="flex:1; overflow-y:auto;">
            </div>
        <button class="fab" onclick="openConnectScreen()">+</button>
    </div>

    <div id="screen-connect" class="screen hidden">
        <header>
            <button onclick="showScreen('screen-main')" style="background:none; border:none; color:var(--primary); font-size:16px; font-weight:bold;">❮ НАЗАД</button>
            <h1 style="font-size: 18px;">Новая связь</h1>
            <div style="width: 50px;"></div>
        </header>
        <div class="container">
            <div class="card">
                <div class="instruction">
                    <b>Как подключиться:</b><br>
                    1. Нажми <b>OFFER</b> и скинь код другу.<br>
                    2. Друг нажмет <b>ANSWER</b>, вставит твой код и скинет свой.<br>
                    3. Вставь код друга в нижнее поле и жми <b>ПОДКЛЮЧИТЬ</b>.
                </div>
                
                <label style="font-size:12px; color:var(--primary); font-weight:bold;">ВАШ КОД (OFFER / ANSWER):</label>
                <textarea id="sdp-offer" readonly onclick="this.select(); document.execCommand('copy');" placeholder="Здесь появится ваш код..."></textarea>
                
                <label style="font-size:12px; color:var(--text-dim); font-weight:bold;">КОД ДРУГА:</label>
                <textarea id="sdp-answer" placeholder="Вставьте сюда код, полученный от друга..."></textarea>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn btn-secondary" onclick="setupWebRTC('offer')" style="flex:1;">OFFER</button>
                    <button class="btn btn-secondary" onclick="setupWebRTC('answer')" style="flex:1;">ANSWER</button>
                </div>
                
                <button class="btn btn-primary" style="margin-top:20px; background:#fff; color:#000;" onclick="finalizeConnect()">ПОДКЛЮЧИТЬ ЧАТ</button>
                
                <div id="conn-status" style="text-align:center; font-size:13px; margin-top:20px; color:yellow; font-weight:bold; min-height: 20px;"></div>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen hidden">
        <header>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button onclick="goBackToMain()" style="background:none; border:none; color:var(--primary); font-size:24px;">❮</button>
                <div style="display: flex; flex-direction: column;">
                    <span id="chat-partner-name" style="font-weight:bold; font-size: 16px;">Собеседник</span>
                    <span id="connection-indicator" style="font-size:10px; color:gray;">Соединение...</span>
                </div>
            </div>
            <button onclick="deleteCurrentChat()" style="background:rgba(255, 77, 77, 0.1); border:1px solid var(--danger); color:var(--danger); padding:6px 12px; border-radius:10px; font-size:11px; font-weight:bold;">УДАЛИТЬ</button>
        </header>
        
        <div style="position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <div id="file-progress-container"><div id="file-progress-bar"></div></div>
            <div id="chat-messages"></div>
        </div>

        <div class="chat-input-bar">
            <label style="cursor:pointer; font-size:28px; padding-right: 5px;">
                📎<input type="file" id="media-input" hidden onchange="handleFileSelect()">
            </label>
            <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
            <button class="voice-btn" id="voice-btn">🎤</button>
            <button onclick="sendTextMsg()" style="background:none; border:none; color:var(--primary); font-size:32px; display:flex; align-items:center;">
                <span style="transform: rotate(-15deg);">➤</span>
            </button>
        </div>
    </div>

<script>
    /* --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ --- */
    const $ = id => document.getElementById(id);
    let myNick = localStorage.getItem('pg_nick');
    let chatsData = JSON.parse(localStorage.getItem('pg_chats') || '{}');
    
    let activePC = null; // PeerConnection
    let activeDC = null; // DataChannel
    let currentChatId = null;
    
    // Для записи голоса
    let mediaRec = null;
    let audioChunks = [];
    
    // Для передачи файлов
    let incomingFiles = {}; 
    let currentFileMeta = {};

    /* --- ИНИЦИАЛИЗАЦИЯ --- */
    window.onload = () => {
        if (!myNick) {
            showScreen('screen-nick');
        } else {
            renderMainList();
            showScreen('screen-main');
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        const screen = $(id);
        screen.classList.remove('hidden');
        screen.style.opacity = '0';
        setTimeout(() => screen.style.opacity = '1', 10);
        
        if (id === 'screen-main') renderMainList();
    }

    function handleSaveNick() {
        const val = $('nick-input').value.trim();
        if (val.length < 2) return alert("Ник слишком короткий!");
        myNick = val;
        localStorage.setItem('pg_nick', val);
        renderMainList();
        showScreen('screen-main');
    }

    /* --- ГЛАВНЫЙ ЭКРАН --- */
    function renderMainList() {
        const container = $('chats-list-container');
        container.innerHTML = "";
        const keys = Object.keys(chatsData);
        
        if (keys.length === 0) {
            container.innerHTML = `<div class="empty-list">У вас пока нет чатов.<br>Нажмите <b>+</b>, чтобы подключить друга!</div>`;
            return;
        }

        keys.forEach(id => {
            const chat = chatsData[id];
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.onclick = () => openExistingChat(id);
            
            // Проверяем онлайн ли этот чат сейчас
            const isOnline = (activeDC && activeDC.readyState === 'open' && currentChatId === id);
            
            div.innerHTML = `
                <div class="chat-info">
                    <div class="chat-name">
                        <span class="status-dot ${isOnline ? 'online' : ''}"></span>
                        ${chat.name}
                    </div>
                    <div style="font-size:12px; color:var(--text-dim);">
                        ${chat.history.length > 0 ? 'Последнее сообщение: ' + chat.history[chat.history.length-1].time : 'Нет сообщений'}
                    </div>
                </div>
                <div style="color: var(--primary); font-size: 20px;">❯</div>
            `;
            container.appendChild(div);
        });
    }

    function openConnectScreen() {
        // Если была старая попытка подключения, закрываем её
        if(activePC) {
            activePC.close();
            activePC = null;
        }
        $('sdp-offer').value = '';
        $('sdp-answer').value = '';
        $('conn-status').innerText = '';
        showScreen('screen-connect');
    }

    /* --- WEBRTC СЕРДЦЕ ПРИЛОЖЕНИЯ --- */
    async function setupWebRTC(type) {
        $('conn-status').innerText = "Генерация кода...";
        
        // Используем Google STUN серверы для обхода NAT
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };
        activePC = new RTCPeerConnection(config);
        
        if (type === 'offer') {
            // Создаем канал данных
            activeDC = activePC.createDataChannel("poligram_chat", { reliable: true });
            bindDataChannelEvents(activeDC);
            
            const offer = await activePC.createOffer();
            await activePC.setLocalDescription(offer);
        } else {
            // Режим Answer (ответчик)
            const offerVal = $('sdp-answer').value.trim();
            if(!offerVal) {
                $('conn-status').innerText = "ОШИБКА: Сначала вставь код друга!";
                return;
            }
            try {
                const remoteOffer = new RTCSessionDescription(JSON.parse(atob(offerVal)));
                await activePC.setRemoteDescription(remoteOffer);
                const answer = await activePC.createAnswer();
                await activePC.setLocalDescription(answer);
                
                // Слушаем когда придет канал от инициатора
                activePC.ondatachannel = (event) => {
                    bindDataChannelEvents(event.channel);
                };
            } catch(e) {
                alert("Ошибка: Неверный формат кода Offer!");
                console.error(e);
            }
        }

        // Ждем сбора ICE кандидатов, чтобы получить полный SDP код
        activePC.onicecandidate = (e) => {
            if (!e.candidate) {
                // Все кандидаты собраны, выдаем финальную строку
                const sdpString = btoa(JSON.stringify(activePC.localDescription));
                $('sdp-offer').value = sdpString;
                $('conn-status').innerText = "ГОТОВО! Копируй и отправляй.";
            }
        };
    }

    async function finalizeConnect() {
        const answerVal = $('sdp-answer').value.trim();
        if(!answerVal) return alert("Вставьте код!");
        
        try {
            const remoteDesc = new RTCSessionDescription(JSON.parse(atob(answerVal)));
            await activePC.setRemoteDescription(remoteDesc);
            $('conn-status').innerText = "Соединяем...";
        } catch(e) {
            alert("Ошибка в коде Answer!");
        }
    }

    function bindDataChannelEvents(dc) {
        activeDC = dc;
        dc.binaryType = 'arraybuffer'; // Важно для передачи файлов!
        
        dc.onopen = () => {
            console.log("Канал открыт!");
            // При открытии сразу обмениваемся никами (Хендшейк)
            dc.send(JSON.stringify({ type: 'handshake', nick: myNick }));
        };

        dc.onclose = () => {
            console.log("Канал закрыт");
            $('connection-indicator').innerText = "Офлайн";
            $('connection-indicator').style.color = "var(--danger)";
        };

        dc.onmessage = (event) => {
            // Если пришла строка -- это метаданные или текст
            if (typeof event.data === 'string') {
                const msg = JSON.parse(event.data);
                
                if (msg.type === 'handshake') {
                    handlePartnerHandshake(msg.nick);
                } 
                else if (msg.type === 'f-start') {
                    // Начало приема файла
                    currentFileMeta = msg;
                    incomingFiles[msg.name] = [];
                }
                else if (msg.type === 'f-end') {
                    // Конец приема файла
                    const blob = new Blob(incomingFiles[msg.name], { type: msg.mime });
                    const fileURL = URL.createObjectURL(blob);
                    
                    addMessageToChat(currentChatId, {
                        side: 'partner', 
                        type: msg.fType, 
                        val: fileURL, 
                        name: msg.name,
                        time: getCurrentTime()
                    });
                    delete incomingFiles[msg.name];
                    currentFileMeta = {};
                }
                else {
                    // Обычное текстовое или голосовое сообщение
                    addMessageToChat(currentChatId, {
                        ...msg, 
                        side: 'partner', 
                        time: getCurrentTime()
                    });
                }
            } else {
                // Если пришел ArrayBuffer -- это чанк (кусочек) файла
                if(currentFileMeta.name) {
                    incomingFiles[currentFileMeta.name].push(event.data);
                }
            }
        };
    }

    /* --- ЛОГИКА ДУБЛИКАТОВ И ИМЕН --- */
    function handlePartnerHandshake(partnerNick) {
        // Ищем в базе: есть ли уже чат с таким ником?
        let foundId = Object.keys(chatsData).find(id => chatsData[id].name === partnerNick);
        
        if (foundId) {
            currentChatId = foundId;
        } else {
            // Если ника нет -- создаем новый уникальный ID
            currentChatId = "chat_" + Date.now();
            chatsData[currentChatId] = { 
                name: partnerNick, 
                history: [] 
            };
        }
        
        saveData();
        openExistingChat(currentChatId);
    }

    function openExistingChat(id) {
        currentChatId = id;
        $('chat-partner-name').innerText = chatsData[id].name;
        
        // Индикатор сети
        if (activeDC && activeDC.readyState === 'open') {
            $('connection-indicator').innerText = "В сети (P2P)";
            $('connection-indicator').style.color = "var(--primary)";
        } else {
            $('connection-indicator').innerText = "Ожидание подключения...";
            $('connection-indicator').style.color = "gray";
        }
        
        renderMessageHistory();
        showScreen('screen-chat');
    }

    function goBackToMain() {
        currentChatId = null;
        showScreen('screen-main');
    }

    /* --- СООБЩЕНИЯ --- */
    function getCurrentTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessageToChat(chatId, msgObj) {
        // Сохраняем в localStorage только текст и аудио (в base64)
        // Тяжелые файлы (img/vid) сохранять в LS не будем, чтобы не забить память браузера
        if (msgObj.type === 'text' || msgObj.type === 'audio') {
            chatsData[chatId].history.push(msgObj);
            // Лимит истории - 100 сообщений
            if(chatsData[chatId].history.length > 100) chatsData[chatId].history.shift();
            saveData();
        }

        // Если мы в этом чате прямо сейчас -- отрисовываем
        if (currentChatId === chatId) {
            drawMessageBubble(msgObj);
        }
    }

    function drawMessageBubble(m) {
        const wrap = $('chat-messages');
        const div = document.createElement('div');
        div.className = `bubble ${m.side === 'me' ? 'me' : 'partner'}`;
        
        let htmlContent = '';
        if (m.type === 'text') {
            htmlContent = `<div>${escapeHTML(m.val)}</div>`;
        } else if (m.type === 'img') {
            htmlContent = `<img src="${m.val}" class="media-content">
                           <a href="${m.val}" download="${m.name}" class="download-link">💾 Скачать фото</a>`;
        } else if (m.type === 'vid') {
            htmlContent = `<video src="${m.val}" controls class="media-content"></video>
                           <a href="${m.val}" download="${m.name}" class="download-link">💾 Скачать видео</a>`;
        } else if (m.type === 'audio') {
            htmlContent = `<audio src="${m.val}" controls></audio>`;
        } else if (m.type === 'doc') {
            htmlContent = `<a href="${m.val}" download="${m.name}" class="download-link">📄 Документ: ${m.name}</a>`;
        }

        div.innerHTML = htmlContent + `<div class="msg-time">${m.time}</div>`;
        wrap.appendChild(div);
        
        // Скролл вниз
        wrap.scrollTop = wrap.scrollHeight;
    }

    function renderMessageHistory() {
        $('chat-messages').innerHTML = '';
        if (chatsData[currentChatId]) {
            chatsData[currentChatId].history.forEach(msg => drawMessageBubble(msg));
        }
    }

    function sendTextMsg() {
        const input = $('msg-input');
        const text = input.value.trim();
        
        if (!text || !activeDC || activeDC.readyState !== 'open') {
            if (!activeDC || activeDC.readyState !== 'open') alert("Нет подключения к собеседнику!");
            return;
        }

        const msgObj = { type: 'text', val: text };
        activeDC.send(JSON.stringify(msgObj));
        
        addMessageToChat(currentChatId, {
            ...msgObj, 
            side: 'me', 
            time: getCurrentTime()
        });
        
        input.value = '';
    }

    /* --- ФАЙЛЫ (CHUNKED TRANSFER) --- */
    async function handleFileSelect() {
        const file = $('media-input').files[0];
        if (!file || !activeDC || activeDC.readyState !== 'open') return;
        
        // Ограничение 50МБ (чтобы не упал DataChannel)
        if (file.size > 50 * 1024 * 1024) return alert("Файл слишком большой! Лимит 50МБ.");

        const fType = file.type.startsWith('image') ? 'img' : (file.type.startsWith('video') ? 'vid' : 'doc');
        
        $('file-progress-container').style.display = 'block';
        
        // 1. Отправляем сигнал о начале файла
        activeDC.send(JSON.stringify({
            type: 'f-start', 
            name: file.name, 
            mime: file.type, 
            fType: fType
        }));
        
        // 2. Читаем файл и режем на куски по 16КБ (стандарт для RTC)
        const buffer = await file.arrayBuffer();
        const chunkSize = 16384; 
        
        for (let i = 0; i < buffer.byteLength; i += chunkSize) {
            const chunk = buffer.slice(i, i + chunkSize);
            activeDC.send(chunk);
            
            // Прогресс
            const percent = Math.round((i / buffer.byteLength) * 100);
            $('file-progress-bar').style.width = percent + '%';
        }
        
        // 3. Сигнал завершения
        activeDC.send(JSON.stringify({ type: 'f-end', name: file.name }));
        
        // Прячем прогресс
        $('file-progress-container').style.display = 'none';
        $('file-progress-bar').style.width = '0%';
        
        // Добавляем себе в чат визуально
        const localURL = URL.createObjectURL(file);
        addMessageToChat(currentChatId, {
            side: 'me', 
            type: fType, 
            val: localURL, 
            name: file.name, 
            time: getCurrentTime()
        });
        
        $('media-input').value = '';
    }

    /* --- ГОЛОСОВЫЕ (С ФИКСОМ ДЛЯ ANDROID) --- */
    const voiceBtn = $('voice-btn');

    async function startRecording(e) {
        e.preventDefault();
        if (!activeDC || activeDC.readyState !== 'open') return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRec = new MediaRecorder(stream);
            audioChunks = [];

            mediaRec.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRec.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                const reader = new FileReader();
                reader.onload = () => {
                    const base64Data = reader.result;
                    const msg = { type: 'audio', val: base64Data };
                    activeDC.send(JSON.stringify(msg));
                    
                    addMessageToChat(currentChatId, {
                        ...msg, 
                        side: 'me', 
                        time: getCurrentTime()
                    });
                };
                reader.readAsDataURL(audioBlob);
                
                // Выключаем микрофон
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRec.start();
            voiceBtn.classList.add('recording');
        } catch(err) {
            alert("Ошибка доступа к микрофону!");
        }
    }

    function stopRecording() {
        if (mediaRec && mediaRec.state !== 'inactive') {
            // ФИКС: Делаем небольшую задержку, чтобы файл "дозаписался" на мобилках
            setTimeout(() => {
                mediaRec.stop();
                voiceBtn.classList.remove('recording');
            }, 500);
        }
    }

    // Слушатели для кнопки записи
    voiceBtn.onmousedown = startRecording;
    voiceBtn.ontouchstart = startRecording;
    voiceBtn.onmouseup = stopRecording;
    voiceBtn.ontouchend = stopRecording;

    /* --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ --- */
    function deleteCurrentChat() {
        if (confirm(`Удалить переписку с ${chatsData[currentChatId].name}?`)) {
            delete chatsData[currentChatId];
            saveData();
            goBackToMain();
        }
    }

    function clearAllSettings() {
        if (confirm("Это удалит ВАШ ник и ВСЕ чаты. Продолжить?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function saveData() {
        localStorage.setItem('pg_chats', JSON.stringify(chatsData));
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
        });
    }

    // Отправка по Enter
    $('msg-input').onkeypress = (e) => {
        if (e.key === 'Enter') sendTextMsg();
    };

</script>
</body>
