<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLIGRAM</title>
    <style>
        :root {
            --bg: #0b0d10;
            --surface: #1c1f26;
            --primary: #00d26a;
            --text: #ffffff;
            --text-dim: #949ba4;
            --border: #2f333d;
            --accent: #23272e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        header { 
            height: 60px; padding: 0 16px; display: flex; align-items: center; 
            border-bottom: 1px solid var(--border); background: var(--surface); 
            justify-content: space-between; flex-shrink: 0;
        }
        header h1 { font-size: 20px; color: var(--primary); font-weight: 800; text-transform: uppercase; }

        .container { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { 
            background: var(--surface); padding: 24px; border-radius: 24px; 
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        textarea, .input-text { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 12px; margin: 8px 0; 
            outline: none; font-size: 14px; resize: none;
        }
        textarea { height: 80px; font-family: monospace; font-size: 10px; }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: var(--accent); color: #fff; border: 1px solid var(--border); }

        .instruction { font-size: 12px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.5; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }

        /* Стили для Главного меню */
        #chats-list { flex: 1; overflow-y: auto; width: 100%; }
        .chat-item { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; background: var(--bg); }
        .chat-item:active { background: var(--surface); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #444; }
        .status-dot.online { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .chat-last { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .fab { 
            position: absolute; bottom: 24px; right: 24px; width: 64px; height: 64px; 
            border-radius: 50%; background: var(--primary); color: #000; font-size: 32px; 
            border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,210,106,0.4); 
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        /* Чат */
        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 18px; 
            font-size: 15px; line-height: 1.4; position: relative;
            word-wrap: break-word; overflow-wrap: break-word; word-break: break-word;
        }
        .bubble.me { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
        .bubble.partner { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
        
        .media-content { margin-top: 8px; border-radius: 12px; max-width: 100%; display: block; border: 1px solid rgba(255,255,255,0.1); }
        .download-link { font-size: 11px; color: inherit; opacity: 0.8; display: block; margin-top: 8px; text-decoration: underline; font-weight: bold; }

        .chat-input-bar { padding: 12px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .chat-input-bar input { flex: 1; background: var(--bg); border: none; color: #fff; padding: 12px; border-radius: 20px; outline: none; }

        .voice-btn { background: none; border: none; font-size: 24px; cursor: pointer; user-select: none; transition: 0.2s; }
        .voice-btn.recording { color: #ff4d4d; transform: scale(1.3); }

        #file-progress-container { width: 100%; background: var(--bg); height: 4px; display: none; }
        #file-progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.1s; }

        audio.custom-player { width: 220px; height: 45px; margin-top: 8px; display: block; }
    </style>
</head>
<body>

    <div id="screen-nick" class="screen hidden">
        <div class="container" style="justify-content: center;">
            <div class="card">
                <h1 style="color: var(--primary); text-align: center; margin-bottom: 10px;">POLIGRAM</h1>
                <input type="text" id="nick-input" class="input-text" placeholder="Ваш ник...">
                <button class="btn btn-primary" onclick="handleSaveNick()">ПРОДОЛЖИТЬ</button>
            </div>
        </div>
    </div>

    <div id="screen-main" class="screen hidden">
        <header>
            <h1>POLIGRAM</h1>
            <button onclick="clearNick()" style="background:none; border:none; color:var(--text-dim); font-size:12px;">Сменить ник</button>
        </header>
        <div id="chats-list"></div>
        <button class="fab" onclick="showScreen('screen-connect')">+</button>
    </div>

    <div id="screen-connect" class="screen hidden">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="showScreen('screen-main')" style="background:none; border:none; color:var(--primary); font-size:24px; cursor:pointer;">❮</button>
                <h1 style="font-size: 16px;">ПОДКЛЮЧЕНИЕ</h1>
            </div>
        </header>
        <div class="container">
            <div class="card">
                <div class="instruction">
                    <b>Хост:</b> Создай Offer -> Отправь другу -> Вставь Answer -> Подключи.<br><br>
                    <b>Клиент:</b> Вставь Offer -> Создай Answer -> Отправь другу.
                </div>
                
                <textarea id="sdp-offer" placeholder="Offer (Код инициатора)" onclick="this.select()"></textarea>
                <textarea id="sdp-answer" placeholder="Answer (Код ответчика)" onclick="this.select()"></textarea>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="doOffer()">СОЗДАТЬ OFFER</button>
                    <button class="btn btn-primary" onclick="doAnswer()">СОЗДАТЬ ANSWER</button>
                </div>
                <button class="btn btn-primary" style="margin-top:10px; background:#fff; color:#000;" onclick="doConnect()">ПОДКЛЮЧИТЬ</button>
                <div id="status-text" style="text-align:center; font-size:12px; margin-top:15px; color:yellow;">Ожидание...</div>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen hidden">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="exitChat()" style="background:none; border:none; color:var(--primary); font-size:24px; cursor:pointer;">❮</button>
                <span id="chat-partner-name" style="font-weight:bold;">Чат</span>
            </div>
            <div style="display: flex; gap: 5px; align-items: center;">
                <button class="btn-secondary" style="padding:6px 10px; border-radius:8px; font-size:11px;" onclick="clearMyHistory()">Очистить чат</button>
            </div>
        </header>
        <div id="chat-messages"></div>
        <div id="file-progress-container"><div id="file-progress-bar"></div></div>
        <div class="chat-input-bar">
            <label style="cursor:pointer; font-size:20px;">📎<input type="file" id="media-input" hidden onchange="handleMedia()"></label>
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button class="voice-btn" id="voice-btn">🎤</button>
            <button onclick="handleSendText()" style="background:none; border:none; color:var(--primary); font-size:24px;">➡️</button>
        </div>
    </div>

<script>
    const $ = id => document.getElementById(id);
    let pc, dataChannel, myNick = localStorage.getItem('pg_nick');
    // Теперь история хранится по ID чатов, чтобы поддерживать несколько собеседников
    let chats = JSON.parse(localStorage.getItem('pg_chats') || '{}');
    let currentChatId = null;
    let incomingChunks = {}, currentFileMeta = null;
    let mediaRecorder, audioChunks = [], isRecording = false;

    window.onload = () => {
        if (!myNick) showScreen('screen-nick');
        else {
            renderChatList();
            showScreen('screen-main');
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        $(id).classList.remove('hidden');
        if(id === 'screen-main') renderChatList();
        if(id === 'screen-connect') initRTC();
    }

    function renderChatList() {
        const list = $('chats-list');
        list.innerHTML = "";
        const chatIds = Object.keys(chats);
        
        if(chatIds.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:var(--text-dim); margin-top:50px;">Нет активных чатов.<br>Нажми + чтобы подключиться.</div>`;
            return;
        }

        chatIds.forEach(id => {
            const c = chats[id];
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.onclick = () => openExistingChat(id);
            
            const isOnline = (dataChannel && dataChannel.readyState === 'open' && currentChatId === id);
            let lastMsg = "Нет сообщений";
            if(c.history && c.history.length > 0) {
                const last = c.history[c.history.length-1];
                lastMsg = last.type === 'text' ? last.content : `[${last.type}]`;
            }

            div.innerHTML = `
                <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                <div class="chat-info">
                    <div class="chat-name">${c.name}</div>
                    <div class="chat-last">${lastMsg}</div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function initRTC() {
        if(pc) pc.close();
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        $('sdp-offer').value = '';
        $('sdp-answer').value = '';
        $('status-text').innerText = "Ожидание...";
        
        pc.ondatachannel = e => setupChannel(e.channel);
        pc.onicecandidate = e => {
            if (!e.candidate && pc.localDescription) {
                const sdp = btoa(JSON.stringify(pc.localDescription));
                if (pc.localDescription.type === 'offer') $('sdp-offer').value = sdp;
                else $('sdp-answer').value = sdp;
                $('status-text').innerText = "Код готов! Скопируйте его.";
            }
        };
    }

    function handleSaveNick() {
        const n = $('nick-input').value.trim();
        if (n) { localStorage.setItem('pg_nick', n); myNick = n; renderChatList(); showScreen('screen-main'); }
    }

    function clearNick() { localStorage.clear(); location.reload(); }

    async function doOffer() {
        try {
            dataChannel = pc.createDataChannel("chat");
            setupChannel(dataChannel);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            $('status-text').innerText = "Генерация Offer...";
        } catch(e) { alert("Ошибка создания Offer: " + e.message); }
    }

    async function doAnswer() {
        const o = $('sdp-offer').value.trim();
        if (!o) return alert("Сначала вставьте Offer друга!");
        try {
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(o))));
            const a = await pc.createAnswer();
            await pc.setLocalDescription(a);
            $('status-text').innerText = "Генерация Answer...";
        } catch(e) { alert("Неверный код Offer!"); }
    }

    async function doConnect() {
        const a = $('sdp-answer').value.trim();
        if (!a) return alert("Вставьте Answer!");
        try {
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(a))));
            $('status-text').innerText = "Подключение...";
        } catch(e) { alert("Неверный код Answer!"); }
    }

    function setupChannel(chan) {
        dataChannel = chan;
        dataChannel.binaryType = 'arraybuffer';
        dataChannel.onopen = () => {
            dataChannel.send(JSON.stringify({type:'nick', val: myNick}));
        };
        dataChannel.onmessage = e => {
            if (typeof e.data === 'string') {
                const d = JSON.parse(e.data);
                if (d.type === 'nick') {
                    // Ищем, есть ли уже чат с таким именем
                    let foundId = Object.keys(chats).find(id => chats[id].name === d.val);
                    if(!foundId) {
                        foundId = 'chat_' + Date.now();
                        chats[foundId] = { name: d.val, history: [] };
                        localStorage.setItem('pg_chats', JSON.stringify(chats));
                    }
                    currentChatId = foundId;
                    openExistingChat(currentChatId);
                }
                else if (d.type === 'file-start') { currentFileMeta = d; incomingChunks[d.name] = []; }
                else if (d.type === 'file-end') {
                    const blob = new Blob(incomingChunks[d.name], { type: d.mime });
                    saveMsg(URL.createObjectURL(blob), 'partner', d.fileType, d.name);
                } else saveMsg(d.content, 'partner', d.type);
            } else if (currentFileMeta) {
                incomingChunks[currentFileMeta.name].push(e.data);
            }
        };
        dataChannel.onclose = () => { 
            alert("Собеседник отключился."); 
            showScreen('screen-main'); 
        };
    }

    function openExistingChat(id) {
        currentChatId = id;
        $('chat-partner-name').innerText = chats[id].name;
        showScreen('screen-chat');
        renderHistory();
    }

    function exitChat() {
        showScreen('screen-main');
    }

    // --- ГОЛОСОВЫЕ СООБЩЕНИЯ ---
    const startRecord = async (e) => {
        if (e) e.preventDefault(); 
        if (isRecording) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = ev => {
                if (ev.data.size > 0) audioChunks.push(ev.data);
            };
            
            mediaRecorder.onstop = () => {
                isRecording = false;
                const mimeType = mediaRecorder.mimeType || 'audio/webm';
                const blob = new Blob(audioChunks, { type: mimeType });
                stream.getTracks().forEach(track => track.stop());
                if (blob.size < 100) return; 
                const fileName = "voice_" + Date.now() + (mimeType.includes('webm') ? '.webm' : '.ogg');
                sendFile(new File([blob], fileName, {type: mimeType}), 'audio');
            };
            
            mediaRecorder.start();
            isRecording = true;
            $('voice-btn').classList.add('recording');
        } catch(err) { alert("Ошибка доступа к микрофону."); }
    };

    const stopRecord = (e) => {
        if (e) e.preventDefault();
        if (isRecording && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
            $('voice-btn').classList.remove('recording');
        }
    };

    const voiceBtn = $('voice-btn');
    voiceBtn.addEventListener('touchstart', startRecord);
    voiceBtn.addEventListener('touchend', stopRecord);
    voiceBtn.addEventListener('touchcancel', stopRecord);
    voiceBtn.addEventListener('mousedown', startRecord);
    voiceBtn.addEventListener('mouseup', stopRecord);
    voiceBtn.addEventListener('mouseleave', stopRecord);

    // --- ПЕРЕДАЧА ФАЙЛОВ ---
    async function handleMedia() {
        const file = $('media-input').files[0];
        if (file) sendFile(file, file.type.startsWith('video') ? 'video' : 'image');
    }

    async function sendFile(file, fileType) {
        if (dataChannel?.readyState !== "open") return alert('Нет подключения!');
        $('file-progress-container').style.display = 'block';
        dataChannel.send(JSON.stringify({type: 'file-start', name: file.name, mime: file.type, fileType: fileType}));
        const buffer = await file.arrayBuffer();
        const chunkSize = 16384;
        for (let i = 0; i < buffer.byteLength; i += chunkSize) {
            dataChannel.send(buffer.slice(i, i + chunkSize));
            $('file-progress-bar').style.width = ((i / buffer.byteLength) * 100) + '%';
        }
        dataChannel.send(JSON.stringify({type: 'file-end', name: file.name, fileType: fileType}));
        $('file-progress-container').style.display = 'none';
        $('file-progress-bar').style.width = '0%';
        
        saveMsg(URL.createObjectURL(file), 'me', fileType, file.name);
        if (fileType !== 'audio') $('media-input').value = ""; 
    }

    function handleSendText() {
        const val = $('msg-input').value.trim();
        if (val && dataChannel?.readyState === "open") {
            dataChannel.send(JSON.stringify({type:'text', content: val}));
            saveMsg(val, 'me', 'text');
            $('msg-input').value = "";
        }
    }

    function saveMsg(content, side, type, name = '') {
        const msg = { content, side, type, name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
        
        if (type !== 'image' && type !== 'video') {
            chats[currentChatId].history.push(msg);
            if (chats[currentChatId].history.length > 50) chats[currentChatId].history.shift();
            localStorage.setItem('pg_chats', JSON.stringify(chats));
        }
        renderMsg(msg);
    }

    function renderMsg(m) {
        const div = document.createElement('div');
        div.className = `bubble ${m.side}`;
        let inner = m.type === 'text' ? `<div>${m.content}</div>` : '';
        if (m.type === 'image') inner = `<img src="${m.content}" class="media-content"><a href="${m.content}" download="${m.name}" class="download-link">Скачать фото</a>`;
        if (m.type === 'video') inner = `<video src="${m.content}" controls class="media-content"></video><a href="${m.content}" download="${m.name}" class="download-link">Скачать видео</a>`;
        if (m.type === 'audio') inner = `<audio src="${m.content}" controls class="custom-player"></audio>`;
        
        div.innerHTML = inner + `<div style="font-size:9px; opacity:0.5; text-align:right; margin-top:4px;">${m.time}</div>`;
        $('chat-messages').appendChild(div);
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
    }

    function renderHistory() {
        $('chat-messages').innerHTML = "";
        if(currentChatId && chats[currentChatId]) {
            chats[currentChatId].history.forEach(renderMsg);
        }
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
    }

    function clearMyHistory() {
        if (confirm("Очистить историю этого чата?")) {
            chats[currentChatId].history = [];
            localStorage.setItem('pg_chats', JSON.stringify(chats));
            renderHistory();
        }
    }

    $('msg-input').onkeypress = e => e.key === 'Enter' && handleSendText();
</script>
</body>
</html>
