<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLIGRAM CLASSIC</title>
    <style>
        /* ВОЗВРАЩАЕМ СТАРУЮ ЦВЕТОВУЮ СХЕМУ */
        :root {
            --bg: #0b0d10;
            --surface: #1c1f26;
            --primary: #00d26a;
            --text: #ffffff;
            --text-dim: #949ba4;
            --border: #2f333d;
            --accent: #23272e;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Экраны */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        /* Шапка */
        header { 
            height: 60px; padding: 0 16px; display: flex; align-items: center; 
            border-bottom: 1px solid var(--border); background: var(--surface); 
            justify-content: space-between; flex-shrink: 0;
        }
        header h1 { font-size: 20px; color: var(--primary); font-weight: bold; }

        .container { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        .card { 
            background: var(--surface); padding: 20px; border-radius: 15px; 
            width: 100%; max-width: 400px; border: 1px solid var(--border);
        }

        textarea, .input-text { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 10px; margin: 8px 0; 
            outline: none; font-size: 14px; resize: none;
        }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }

        .instruction { font-size: 12px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.4; }

        /* Список чатов */
        .chat-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .status-dot.online { background: var(--primary); }

        /* Сообщения */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .bubble.me { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 2px; }
        .bubble.partner { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 2px; }
        
        .media-content { margin-top: 5px; border-radius: 10px; max-width: 100%; display: block; }

        /* Ввод */
        .chat-input-bar { padding: 10px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .chat-input-bar input { flex: 1; background: var(--bg); border: none; color: #fff; padding: 10px; border-radius: 5px; outline: none; }

        .voice-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
        .voice-btn.recording { color: var(--danger); }

        #file-progress { width: 100%; height: 3px; background: var(--bg); display: none; }
        #file-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.1s; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 30px; background: var(--primary); color: #000; font-size: 30px; border: none; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        audio { width: 200px; height: 40px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div id="screen-nick" class="screen hidden">
        <div class="container" style="justify-content: center;">
            <div class="card">
                <h1 style="text-align: center; margin-bottom: 10px;">POLIGRAM</h1>
                <input type="text" id="nick-input" class="input-text" placeholder="Твой ник...">
                <button class="btn btn-primary" onclick="saveNick()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="screen-main" class="screen hidden">
        <header>
            <h1>POLIGRAM</h1>
            <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:var(--text-dim);">Выход</button>
        </header>
        <div id="chats-list" style="flex:1; overflow-y:auto;"></div>
        <button class="fab" onclick="showScreen('screen-connect')">+</button>
    </div>

    <div id="screen-connect" class="screen hidden">
        <header>
            <h1>Добавить друга</h1>
        </header>
        <div class="container">
            <div class="card">
                <div class="instruction">Нажми OFFER -> Скинь другу. Получи ANSWER -> Вставь вниз.</div>
                <textarea id="sdp-offer" placeholder="Твой код (OFFER)"></textarea>
                <textarea id="sdp-answer" placeholder="Код друга (ANSWER)"></textarea>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="initRTC('offer')">OFFER</button>
                    <button class="btn btn-primary" onclick="initRTC('answer')">ANSWER</button>
                </div>
                <button class="btn btn-primary" style="margin-top:10px; background:#fff; color:#000;" onclick="connectRTC()">ПОДКЛЮЧИТЬ</button>
                <button class="btn btn-danger" style="margin-top:10px;" onclick="showScreen('screen-main')">ОТМЕНА</button>
                <div id="status" style="text-align:center; font-size:12px; margin-top:10px; color:yellow;"></div>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen hidden">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="showScreen('screen-main')" style="background:none; border:none; color:var(--primary); font-size:18px;">❮</button>
                <span id="chat-title">Чат</span>
            </div>
            <button onclick="deleteChat()" style="background:none; border:none; color:var(--danger); font-size:12px;">Удалить</button>
        </header>
        <div id="file-progress"><div id="file-bar"></div></div>
        <div id="chat-messages"></div>
        <div class="chat-input-bar">
            <label style="font-size:24px; cursor:pointer;">📎<input type="file" id="file-input" hidden onchange="sendFile()"></label>
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button class="voice-btn" id="voice-btn">🎤</button>
            <button onclick="sendText()" style="background:none; border:none; color:var(--primary); font-size:24px;">➡️</button>
        </div>
    </div>

<script>
    const $ = id => document.getElementById(id);
    let myNick = localStorage.getItem('pg_nick');
    let chats = JSON.parse(localStorage.getItem('pg_chats') || '{}');
    
    let pc = null, dc = null, currentId = null;
    let mediaRec, chunks = [];
    let fileChunks = {}, fileMeta = {};

    window.onload = () => {
        if (!myNick) showScreen('screen-nick');
        else { renderList(); showScreen('screen-main'); }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        $(id).classList.remove('hidden');
        if (id === 'screen-main') renderList();
    }

    function saveNick() {
        const n = $('nick-input').value.trim();
        if (n) { myNick = n; localStorage.setItem('pg_nick', n); showScreen('screen-main'); }
    }

    function renderList() {
        const list = $('chats-list');
        list.innerHTML = "";
        Object.keys(chats).forEach(id => {
            const item = document.createElement('div');
            item.className = 'chat-item';
            item.onclick = () => openChat(id);
            const online = (dc && dc.readyState === 'open' && currentId === id);
            item.innerHTML = `<div class="status-dot ${online?'online':''}"></div><div><b>${chats[id].name}</b></div>`;
            list.appendChild(item);
        });
    }

    async function initRTC(type) {
        if(pc) pc.close();
        pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
        
        if (type === 'offer') {
            dc = pc.createDataChannel("chat");
            setupDC(dc);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
        } else {
            const o = JSON.parse(atob($('sdp-offer').value));
            await pc.setRemoteDescription(o);
            const a = await pc.createAnswer();
            await pc.setLocalDescription(a);
            pc.ondatachannel = e => setupDC(e.channel);
        }

        pc.onicecandidate = e => {
            if (!e.candidate) {
                const sdp = btoa(JSON.stringify(pc.localDescription));
                if (type === 'offer') $('sdp-offer').value = sdp;
                else $('sdp-answer').value = sdp;
                $('status').innerText = "Код готов! Скопируй и отправь другу.";
            }
        };
    }

    async function connectRTC() {
        const a = JSON.parse(atob($('sdp-answer').value));
        await pc.setRemoteDescription(a);
    }

    function setupDC(channel) {
        dc = channel;
        dc.binaryType = 'arraybuffer';
        
        dc.onopen = () => {
            dc.send(JSON.stringify({type:'nick', val: myNick}));
        };

        dc.onmessage = e => {
            if (typeof e.data === 'string') {
                const d = JSON.parse(e.data);
                if (d.type === 'nick') {
                    // ИСПРАВЛЕНИЕ: ПРОВЕРКА НА ОДИНАКОВЫЕ ЧАТЫ
                    let foundId = Object.keys(chats).find(id => chats[id].name === d.val);
                    if (foundId) {
                        currentId = foundId;
                    } else {
                        currentId = "ch_" + Date.now();
                        chats[currentId] = { name: d.val, history: [] };
                    }
                    $('chat-title').innerText = d.val;
                    save();
                    showScreen('screen-chat');
                } else if (d.type === 'f-start') {
                    fileMeta = d;
                    fileChunks[d.name] = [];
                } else if (d.type === 'f-end') {
                    const blob = new Blob(fileChunks[d.name], {type: d.mime});
                    const url = URL.createObjectURL(blob);
                    addMsg({type: d.fType, val: url, name: d.name, side: 'partner'});
                    delete fileChunks[d.name];
                } else {
                    addMsg({...d, side: 'partner'});
                }
            } else {
                if(fileMeta.name) fileChunks[fileMeta.name].push(e.data);
            }
        };
    }

    function openChat(id) {
        currentId = id;
        $('chat-title').innerText = chats[id].name;
        renderMsgs();
        showScreen('screen-chat');
    }

    function addMsg(m) {
        m.time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        if (m.type === 'text' || m.type === 'audio') {
            chats[currentId].history.push(m);
            save();
        }
        drawMsg(m);
    }

    function drawMsg(m) {
        const wrap = $('chat-messages');
        const div = document.createElement('div');
        div.className = `bubble ${m.side === 'me' ? 'me' : 'partner'}`;
        
        let html = '';
        if (m.type === 'text') html = `<div>${m.val}</div>`;
        if (m.type === 'img') html = `<img src="${m.val}" class="media-content">`;
        if (m.type === 'vid') html = `<video src="${m.val}" controls class="media-content"></video>`;
        if (m.type === 'audio') html = `<audio src="${m.val}" controls></audio>`;
        if (m.name && m.type === 'file') html = `<a href="${m.val}" download="${m.name}" style="color:inherit;">📄 ${m.name}</a>`;

        div.innerHTML = html + `<div style="font-size:9px; opacity:0.5; text-align:right;">${m.time}</div>`;
        wrap.appendChild(div);
        wrap.scrollTop = wrap.scrollHeight;
    }

    function renderMsgs() {
        $('chat-messages').innerHTML = "";
        chats[currentId].history.forEach(drawMsg);
    }

    function sendText() {
        const v = $('msg-input').value.trim();
        if (!v || !dc || dc.readyState !== 'open') return;
        const m = {type:'text', val: v};
        dc.send(JSON.stringify(m));
        addMsg({...m, side: 'me'});
        $('msg-input').value = "";
    }

    async function sendFile() {
        const file = $('file-input').files[0];
        if (!file || !dc) return;
        
        const fType = file.type.startsWith('image') ? 'img' : (file.type.startsWith('video') ? 'vid' : 'file');
        $('file-progress').style.display = 'block';
        
        dc.send(JSON.stringify({type:'f-start', name: file.name, mime: file.type, fType: fType}));
        
        const buffer = await file.arrayBuffer();
        const chunkSize = 16384;
        for (let i = 0; i < buffer.byteLength; i += chunkSize) {
            dc.send(buffer.slice(i, i + chunkSize));
            $('file-bar').style.width = ((i / buffer.byteLength) * 100) + '%';
        }
        
        dc.send(JSON.stringify({type:'f-end', name: file.name}));
        $('file-progress').style.display = 'none';
        $('file-bar').style.width = '0%';
        
        addMsg({type: fType, val: URL.createObjectURL(file), name: file.name, side: 'me'});
        $('file-input').value = "";
    }

    // ГОЛОСОВЫЕ С ЗАДЕРЖКОЙ ДЛЯ АНДРОИД
    const vBtn = $('voice-btn');
    vBtn.onmousedown = vBtn.ontouchstart = async (e) => {
        e.preventDefault();
        if (!dc || dc.readyState !== 'open') return;
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = ev => chunks.push(ev.data);
        mediaRec.onstop = () => {
            const blob = new Blob(chunks, {type:'audio/ogg'});
            const reader = new FileReader();
            reader.onload = () => {
                const m = {type:'audio', val: reader.result};
                dc.send(JSON.stringify(m));
                addMsg({...m, side: 'me'});
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
        };
        mediaRec.start();
        vBtn.classList.add('recording');
    };

    vBtn.onmouseup = vBtn.ontouchend = () => {
        if (mediaRec && mediaRec.state !== 'inactive') {
            setTimeout(() => {
                mediaRec.stop();
                vBtn.classList.remove('recording');
            }, 500);
        }
    };

    function deleteChat() {
        if(confirm("Удалить этот чат навсегда?")) {
            delete chats[currentId];
            save();
            showScreen('screen-main');
        }
    }

    function save() { localStorage.setItem('pg_chats', JSON.stringify(chats)); }
    $('msg-input').onkeypress = e => { if(e.key === 'Enter') sendText(); };
</script>
</body>
</html>
