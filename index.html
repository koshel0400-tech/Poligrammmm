<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLIGRAM</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0b0d10;
            --surface: #1c1f26;
            --primary: #00d26a;
            --text: #ffffff;
            --text-dim: #949ba4;
            --border: #2f333d;
            --accent: #23272e;
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        /* Шапка */
        header { 
            height: 60px; padding: 0 16px; display: flex; align-items: center; 
            border-bottom: 1px solid var(--border); background: var(--surface); 
            justify-content: space-between; 
        }
        header h1 { font-size: 20px; color: var(--primary); font-weight: 800; }

        /* Контейнеры форм */
        .container { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { 
            background: var(--surface); padding: 24px; border-radius: 24px; 
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Поля ввода */
        textarea, .input-text { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 12px; margin: 8px 0; 
            outline: none; font-size: 14px; resize: none;
        }
        textarea { height: 80px; font-family: monospace; font-size: 10px; }
        
        .btn { 
            width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; 
            cursor: pointer; border: none; transition: 0.2s; margin-top: 5px;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: var(--accent); color: #fff; border: 1px solid var(--border); }
        .btn-danger { background: none; color: var(--error); border: 1px solid var(--error); margin-top: 15px; }

        /* Чат */
        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 18px; 
            font-size: 15px; line-height: 1.4; position: relative; 
        }
        .bubble.me { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
        .bubble.partner { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
        
        .media-content { margin-top: 8px; border-radius: 12px; max-width: 100%; display: block; border: 1px solid rgba(255,255,255,0.1); }
        .download-link { font-size: 11px; color: inherit; opacity: 0.7; display: block; margin-top: 5px; }

        /* Ввод в чате */
        .chat-input-bar { 
            padding: 12px; background: var(--surface); border-top: 1px solid var(--border); 
            display: flex; gap: 10px; align-items: center;
        }
        .chat-input-bar input { flex: 1; background: var(--bg); border: none; color: #fff; padding: 12px; border-radius: 20px; outline: none; }

        .instruction { font-size: 11px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.4; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: gray; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="screen-nick" class="screen hidden">
        <div class="container" style="justify-content: center;">
            <div class="card">
                <h1 style="color: var(--primary); text-align: center; margin-bottom: 10px;">POLIGRAM</h1>
                <p style="text-align: center; color: var(--text-dim); margin-bottom: 20px;">Введите ваш ник для начала</p>
                <input type="text" id="nick-input" class="input-text" placeholder="Ваш ник...">
                <button class="btn btn-primary" onclick="handleSaveNick()">ПРОДОЛЖИТЬ</button>
            </div>
        </div>
    </div>

    <div id="screen-connect" class="screen hidden">
        <header>
            <h1>POLIGRAM</h1>
            <button onclick="clearNick()" style="background:none; border:none; color:var(--text-dim); font-size:12px;">Сменить ник</button>
        </header>
        <div class="container">
            <div class="card">
                <h3 style="margin-bottom: 10px;">Ручной WebRTC</h3>
                <div class="instruction">
                    <b>Хост:</b> Создай Offer -> Отправь другу -> Вставь Answer -> Подключи.<br>
                    <b>Клиент:</b> Вставь Offer -> Создай Answer -> Отправь другу.
                </div>
                
                <textarea id="sdp-offer" placeholder="Offer (Код инициатора)"></textarea>
                <textarea id="sdp-answer" placeholder="Answer (Код ответчика)"></textarea>
                
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" style="font-size:12px;" onclick="doOffer()">СОЗДАТЬ OFFER</button>
                    <button class="btn btn-primary" style="font-size:12px;" onclick="doAnswer()">СОЗДАТЬ ANSWER</button>
                </div>
                <button class="btn btn-primary" style="margin-top:10px; background:#fff;" onclick="doConnect()">ПОДКЛЮЧИТЬ ANSWER</button>
                
                <div id="status-text" style="text-align:center; font-size:12px; margin-top:15px; color:yellow;">Готов к работе</div>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen hidden">
        <header>
            <div>
                <span class="status-dot" style="background: var(--primary);"></span>
                <span id="chat-partner-name" style="font-weight:bold;">Чат</span>
            </div>
            <button class="btn btn-secondary" style="width:auto; padding:5px 10px;" onclick="closeConnection()">Выйти</button>
        </header>
        
        <div id="chat-messages"></div>

        <div class="chat-input-bar">
            <label style="cursor:pointer; font-size:20px;">📎<input type="file" id="media-input" hidden onchange="handleMedia()"></label>
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button onclick="handleSendText()" style="background:none; border:none; color:var(--primary); font-size:20px;">➡️</button>
        </div>
    </div>

<script>
    const $ = id => document.getElementById(id);
    let pc, dataChannel, myNick = localStorage.getItem('pg_nick');
    let history = JSON.parse(localStorage.getItem('pg_history') || '[]');

    window.onload = () => {
        if (!myNick) showScreen('screen-nick');
        else showScreen('screen-connect');
        initRTC();
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        $(id).classList.remove('hidden');
    }

    function initRTC() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.ondatachannel = e => setupChannel(e.channel);
        pc.onicecandidate = e => {
            if (!e.candidate && pc.localDescription) {
                const sdp = btoa(JSON.stringify(pc.localDescription));
                if (pc.localDescription.type === 'offer') $('sdp-offer').value = sdp;
                else $('sdp-answer').value = sdp;
                $('status-text').innerText = "Код сформирован! Скопируйте его.";
            }
        };
    }

    // Логика кнопок
    function handleSaveNick() {
        const n = $('nick-input').value.trim();
        if (n) { localStorage.setItem('pg_nick', n); myNick = n; showScreen('screen-connect'); }
    }

    function clearNick() { localStorage.removeItem('pg_nick'); location.reload(); }

    async function doOffer() {
        dataChannel = pc.createDataChannel("chat");
        setupChannel(dataChannel);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        $('status-text').innerText = "Генерация Offer...";
    }

    async function doAnswer() {
        const o = $('sdp-offer').value.trim();
        if (!o) return alert("Вставьте Offer!");
        await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(o))));
        const a = await pc.createAnswer();
        await pc.setLocalDescription(a);
        $('status-text').innerText = "Генерация Answer...";
    }

    async function doConnect() {
        const a = $('sdp-answer').value.trim();
        if (a) await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(a))));
    }

    function setupChannel(chan) {
        dataChannel = chan;
        dataChannel.onopen = () => {
            showScreen('screen-chat');
            renderHistory();
            dataChannel.send(JSON.stringify({type:'nick', val: myNick}));
        };
        dataChannel.onmessage = e => {
            const d = JSON.parse(e.data);
            if (d.type === 'nick') $('chat-partner-name').innerText = d.val;
            else saveMsg(d.content, 'partner', d.type, d.name);
        };
    }

    // Сообщения и Медиа
    function handleSendText() {
        const val = $('msg-input').value.trim();
        if (val && dataChannel?.readyState === "open") {
            dataChannel.send(JSON.stringify({type:'text', content: val}));
            saveMsg(val, 'me', 'text');
            $('msg-input').value = "";
        }
    }

    function handleMedia() {
        const file = $('media-input').files[0];
        if (!file || dataChannel?.readyState !== "open") return;
        const reader = new FileReader();
        reader.onload = e => {
            const type = file.type.startsWith('video') ? 'video' : 'image';
            dataChannel.send(JSON.stringify({type, content: e.target.result, name: file.name}));
            saveMsg(e.target.result, 'me', type, file.name);
        };
        reader.readAsDataURL(file);
    }

    function saveMsg(content, side, type, name = '') {
        const msg = { content, side, type, name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
        history.push(msg);
        localStorage.setItem('pg_history', JSON.stringify(history));
        renderMsg(msg);
    }

    function renderMsg(m) {
        const div = document.createElement('div');
        div.className = `bubble ${m.side}`;
        let html = `<div>${m.type === 'text' ? m.content : ''}</div>`;
        if (m.type === 'image') {
            html = `<img src="${m.content}" class="media-content"><a href="${m.content}" download="${m.name}" class="download-link">Скачать фото</a>`;
        } else if (m.type === 'video') {
            html = `<video src="${m.content}" controls class="media-content"></video><a href="${m.content}" download="${m.name}" class="download-link">Скачать видео</a>`;
        }
        div.innerHTML = html + `<div style="font-size:9px; opacity:0.5; text-align:right; margin-top:4px;">${m.time}</div>`;
        $('chat-messages').appendChild(div);
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
    }

    function renderHistory() { $('chat-messages').innerHTML = ""; history.forEach(renderMsg); }

    function closeConnection() {
        if (confirm("Закрыть чат и очистить историю?")) {
            localStorage.removeItem('pg_history');
            location.reload();
        }
    }

    $('msg-input').onkeypress = e => e.key === 'Enter' && handleSendText();
</script>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
