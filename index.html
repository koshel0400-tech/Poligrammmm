<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLIGRAM ULTIMATE FAST</title>
    <style>
        :root {
            --bg: #0b0d10;
            --surface: #1c1f26;
            --primary: #00d26a;
            --text: #ffffff;
            --text-dim: #949ba4;
            --border: #2f333d;
            --accent: #23272e;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        header { 
            height: 60px; padding: 0 16px; display: flex; align-items: center; 
            border-bottom: 1px solid var(--border); background: var(--surface); 
            justify-content: space-between; flex-shrink: 0;
        }
        header h1 { font-size: 20px; color: var(--primary); font-weight: 800; }

        .container { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { 
            background: var(--surface); padding: 24px; border-radius: 24px; 
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        textarea, .input-text { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 12px; margin: 8px 0; 
            outline: none; font-size: 14px; resize: none;
        }
        textarea { height: 80px; font-family: monospace; font-size: 10px; }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: var(--accent); color: #fff; border: 1px solid var(--border); }

        .instruction { font-size: 12px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.5; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }

        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 18px; 
            font-size: 15px; line-height: 1.4; position: relative;
            word-wrap: break-word; 
        }
        .bubble.me { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
        .bubble.partner { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
        
        .media-content { margin-top: 8px; border-radius: 12px; max-width: 100%; display: block; border: 1px solid rgba(255,255,255,0.1); }
        .download-link { font-size: 11px; color: inherit; opacity: 0.8; display: block; margin-top: 8px; text-decoration: underline; font-weight: bold; }

        .chat-input-bar { padding: 12px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .chat-input-bar input { flex: 1; background: var(--bg); border: none; color: #fff; padding: 12px; border-radius: 20px; outline: none; }

        .voice-btn { background: none; border: none; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .voice-btn.recording { color: var(--danger); transform: scale(1.3); }

        #file-progress-container { width: 100%; background: var(--bg); height: 4px; display: none; }
        #file-progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.1s; }

        audio { width: 220px; height: 45px; margin-top: 8px; display: block; }
    </style>
</head>
<body>

    <div id="screen-nick" class="screen hidden">
        <div class="container" style="justify-content: center;">
            <div class="card">
                <h1 style="color: var(--primary); text-align: center; margin-bottom: 10px;">POLIGRAM</h1>
                <input type="text" id="nick-input" class="input-text" placeholder="Ваш ник...">
                <button class="btn btn-primary" onclick="handleSaveNick()">ПРОДОЛЖИТЬ</button>
            </div>
        </div>
    </div>

    <div id="screen-connect" class="screen hidden">
        <header>
            <h1>POLIGRAM</h1>
            <button onclick="clearNick()" style="background:none; border:none; color:var(--text-dim); font-size:12px;">Сброс</button>
        </header>
        <div class="container">
            <div class="card">
                <div class="instruction">
                    <b>Хост:</b> Создай Offer -> Скинь другу -> Вставь Answer -> Подключи.<br><br>
                    <b>Клиент:</b> Вставь Offer -> Создай Answer -> Скинь другу.
                </div>
                
                <textarea id="sdp-offer" placeholder="Offer (Код инициатора)" onclick="this.select()"></textarea>
                <textarea id="sdp-answer" placeholder="Answer (Код ответчика)" onclick="this.select()"></textarea>
                
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="initRTC('offer')">ОФФЕР</button>
                    <button class="btn btn-primary" onclick="initRTC('answer')">АНСВЕР</button>
                </div>
                <button class="btn btn-primary" style="margin-top:10px; background:#fff; color:#000;" onclick="doConnect()">ПОДКЛЮЧИТЬ</button>
                <div id="status-text" style="text-align:center; font-size:12px; margin-top:15px; color:yellow; font-weight: bold;">Ожидание...</div>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen hidden">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); font-size:20px;">❮</button>
                <span id="chat-partner-name">Чат</span>
            </div>
            <button class="btn-secondary" style="padding:5px 12px; border-radius:8px; font-size:11px;" onclick="clearMyHistory()">Очистить</button>
        </header>
        <div id="file-progress-container"><div id="file-progress-bar"></div></div>
        <div id="chat-messages"></div>
        <div class="chat-input-bar">
            <label style="cursor:pointer; font-size:22px;">📎<input type="file" id="media-input" hidden onchange="handleMedia()"></label>
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button class="voice-btn" id="voice-btn">🎤</button>
            <button onclick="handleSendText()" style="background:none; border:none; color:var(--primary); font-size:26px;">➡️</button>
        </div>
    </div>

<script>
    const $ = id => document.getElementById(id);
    let pc, dataChannel, myNick = localStorage.getItem('pg_nick');
    let history = JSON.parse(localStorage.getItem('pg_history') || '[]');
    let incomingChunks = {}, currentFileMeta = null;
    let mediaRecorder, audioChunks = [], isRecording = false;

    // РАСШИРЕННЫЕ СЕРВЕРА ДЛЯ БЫСТРОЙ СВЯЗИ
    const rtcConfig = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun.yandex.net:3478' },
            { urls: 'stun:stun.nextcloud.com:443' }
        ]
    };

    window.onload = () => {
        if (!myNick) showScreen('screen-nick');
        else showScreen('screen-connect');
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        $(id).classList.remove('hidden');
    }

    function handleSaveNick() {
        const n = $('nick-input').value.trim();
        if (n) { localStorage.setItem('pg_nick', n); myNick = n; showScreen('screen-connect'); }
    }

    function clearNick() { localStorage.clear(); location.reload(); }

    // УСКОРЕННАЯ ИНИЦИАЛИЗАЦИЯ
    async function initRTC(type) {
        try {
            if(pc) pc.close();
            pc = new RTCPeerConnection(rtcConfig);
            $('status-text').innerText = "Генерация...";

            if (type === 'offer') {
                dataChannel = pc.createDataChannel("chat");
                setupChannel(dataChannel);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
            } else {
                const oText = $('sdp-offer').value.trim();
                if (!oText) throw new Error("Вставь Offer друга в верхнее поле!");
                await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(oText))));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                pc.ondatachannel = e => setupChannel(e.channel);
            }

            pc.onicecandidate = e => {
                // БЫСТРАЯ ГЕНЕРАЦИЯ: Обновляем текстовое поле сразу же, не ждем конца сбора!
                if (pc.localDescription) {
                    const sdp = btoa(JSON.stringify(pc.localDescription));
                    if (type === 'offer') $('sdp-offer').value = sdp;
                    else $('sdp-answer').value = sdp;
                    $('status-text').innerText = "Код готов! (Можно копировать)";
                }
            };
        } catch(e) { $('status-text').innerText = "Ошибка: " + e.message; }
    }

    async function doConnect() {
        try {
            const aText = $('sdp-answer').value.trim();
            if (!aText) return alert("Вставь Answer!");
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(aText))));
            $('status-text').innerText = "Подключение...";
        } catch(e) { alert("Ошибка подключения!"); }
    }

    function setupChannel(chan) {
        dataChannel = chan;
        dataChannel.binaryType = 'arraybuffer';
        dataChannel.onopen = () => {
            showScreen('screen-chat');
            renderHistory();
            dataChannel.send(JSON.stringify({type:'nick', val: myNick}));
        };
        dataChannel.onmessage = e => {
            if (typeof e.data === 'string') {
                const d = JSON.parse(e.data);
                if (d.type === 'nick') $('chat-partner-name').innerText = d.val;
                else if (d.type === 'f-start') { currentFileMeta = d; incomingChunks[d.name] = []; }
                else if (d.type === 'f-end') {
                    const blob = new Blob(incomingChunks[d.name], { type: d.mime });
                    saveMsg(URL.createObjectURL(blob), 'partner', d.fType, d.name);
                } else saveMsg(d.content, 'partner', 'text');
            } else if (currentFileMeta) {
                incomingChunks[currentFileMeta.name].push(e.data);
            }
        };
    }

    // ГОЛОСОВЫЕ СООБЩЕНИЯ
    const vBtn = $('voice-btn');
    const startRec = async (e) => {
        e.preventDefault(); if (isRecording) return;
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s); audioChunks = [];
            mediaRecorder.ondataavailable = ev => audioChunks.push(ev.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                s.getTracks().forEach(t => t.stop());
                if (blob.size > 1000) sendFile(new File([blob], "voice.ogg", {type:'audio/ogg'}), 'audio');
            };
            mediaRecorder.start(); isRecording = true; vBtn.classList.add('recording');
        } catch(err) { alert("Нет доступа к микро"); }
    };

    const stopRec = () => {
        if (isRecording) { mediaRecorder.stop(); isRecording = false; vBtn.classList.remove('recording'); }
    };

    vBtn.addEventListener('touchstart', startRec); vBtn.addEventListener('touchend', stopRec);
    vBtn.addEventListener('mousedown', startRec); vBtn.addEventListener('mouseup', stopRec);

    // МЕДИА И ТЕКСТ
    async function handleMedia() {
        const file = $('media-input').files[0];
        if (file) {
            let type = 'file';
            if (file.type.startsWith('image')) type = 'image';
            if (file.type.startsWith('video')) type = 'video';
            sendFile(file, type);
        }
    }

    async function sendFile(file, fType) {
        if (dataChannel?.readyState !== "open") return;
        $('file-progress-container').style.display = 'block';
        dataChannel.send(JSON.stringify({type: 'f-start', name: file.name, mime: file.type, fType: fType}));
        const buffer = await file.arrayBuffer();
        const chunkSize = 16384;
        for (let i = 0; i < buffer.byteLength; i += chunkSize) {
            dataChannel.send(buffer.slice(i, i + chunkSize));
            $('file-progress-bar').style.width = ((i / buffer.byteLength) * 100) + '%';
        }
        dataChannel.send(JSON.stringify({type: 'f-end', name: file.name}));
        $('file-progress-container').style.display = 'none';
        saveMsg(URL.createObjectURL(file), 'me', fType, file.name);
    }

    function handleSendText() {
        const v = $('msg-input').value.trim();
        if (v && dataChannel?.readyState === "open") {
            dataChannel.send(JSON.stringify({type:'text', content: v}));
            saveMsg(v, 'me', 'text'); $('msg-input').value = "";
        }
    }

    function saveMsg(content, side, type, name = '') {
        const m = { content, side, type, name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
        if (type === 'text' || type === 'audio') {
            history.push(m); if (history.length > 50) history.shift();
            localStorage.setItem('pg_history', JSON.stringify(history));
        }
        renderMsg(m);
    }

    function renderMsg(m) {
        const div = document.createElement('div');
        div.className = `bubble ${m.side}`;
        let h = m.type === 'text' ? `<div>${m.content}</div>` : '';
        if (m.type === 'image') h = `<img src="${m.content}" class="media-content">`;
        if (m.type === 'video') h = `<video src="${m.content}" controls class="media-content"></video>`;
        if (m.type === 'audio') h = `<audio src="${m.content}" controls></audio>`;
        if (m.name && m.type === 'file') h = `<a href="${m.content}" download="${m.name}" class="download-link">📄 ${m.name}</a>`;
        div.innerHTML = h + `<div style="font-size:9px; opacity:0.4; text-align:right; margin-top:4px;">${m.time}</div>`;
        $('chat-messages').appendChild(div);
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
    }

    function renderHistory() { $('chat-messages').innerHTML = ""; history.forEach(renderMsg); }
    function clearMyHistory() { if(confirm("Очистить?")) { history = []; localStorage.removeItem('pg_history'); renderHistory(); } }
    $('msg-input').onkeypress = e => e.key === 'Enter' && handleSendText();
</script>
</body>
</html>
