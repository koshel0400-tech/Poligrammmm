<meta name='viewport' content='width=device-width, initial-scale=1'/><meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLIGRAM</title>
    <style>
        :root {
            --bg: #0b0d10;
            --surface: #1c1f26;
            --primary: #00d26a;
            --text: #ffffff;
            --text-dim: #949ba4;
            --border: #2f333d;
            --accent: #23272e;
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        header { 
            height: 60px; padding: 0 16px; display: flex; align-items: center; 
            border-bottom: 1px solid var(--border); background: var(--surface); 
            justify-content: space-between; 
        }
        header h1 { font-size: 20px; color: var(--primary); font-weight: 800; }

        .container { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { 
            background: var(--surface); padding: 24px; border-radius: 24px; 
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        textarea, .input-text { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 12px; margin: 8px 0; 
            outline: none; font-size: 14px; resize: none;
        }
        textarea { height: 80px; font-family: monospace; font-size: 10px; }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: var(--accent); color: #fff; border: 1px solid var(--border); }

        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 18px; 
            font-size: 15px; line-height: 1.4; position: relative;
            word-wrap: break-word; overflow-wrap: break-word; word-break: break-all;
        }
        .bubble.me { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
        .bubble.partner { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
        
        .media-content { margin-top: 8px; border-radius: 12px; max-width: 100%; display: block; border: 1px solid rgba(255,255,255,0.1); }
        .download-link { font-size: 11px; color: inherit; opacity: 0.8; display: block; margin-top: 8px; text-decoration: underline; font-weight: bold; }

        .chat-input-bar { padding: 12px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .chat-input-bar input { flex: 1; background: var(--bg); border: none; color: #fff; padding: 12px; border-radius: 20px; outline: none; }

        .instruction { font-size: 11px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.4; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: gray; display: inline-block; margin-right: 5px; }
        
        .voice-btn { background: none; border: none; font-size: 24px; cursor: pointer; user-select: none; transition: 0.2s; }
        .voice-btn.recording { color: #ff4d4d; transform: scale(1.3); }

        .call-btn { background: var(--accent); color: white; padding: 6px 12px; border-radius: 8px; font-size: 13px; border: 1px solid var(--border); cursor: pointer; }
        
        #file-progress-container { width: 100%; background: var(--bg); height: 4px; display: none; }
        #file-progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="screen-nick" class="screen hidden">
        <div class="container" style="justify-content: center;">
            <div class="card">
                <h1 style="color: var(--primary); text-align: center; margin-bottom: 10px;">POLIGRAM</h1>
                <input type="text" id="nick-input" class="input-text" placeholder="Ваш ник...">
                <button class="btn btn-primary" onclick="handleSaveNick()">ПРОДОЛЖИТЬ</button>
            </div>
        </div>
    </div>

    <div id="screen-connect" class="screen hidden">
        <header>
            <h1>POLIGRAM</h1>
            <button onclick="clearNick()" style="background:none; border:none; color:var(--text-dim); font-size:12px;">Сменить ник</button>
        </header>
        <div class="container">
            <div class="card">
                <h3 style="margin-bottom: 10px;">Подключение</h3>
                <div class="instruction">
                    <b>Хост:</b> Создай Offer -> Отправь другу -> Вставь Answer -> Подключи.<br><br>
                    <b>Клиент:</b> Вставь Offer -> Создай Answer -> Отправь другу.
                </div>
                <textarea id="sdp-offer" placeholder="Offer (Код инициатора)"></textarea>
                <textarea id="sdp-answer" placeholder="Answer (Код ответчика)"></textarea>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="doOffer()">СОЗДАТЬ OFFER</button>
                    <button class="btn btn-primary" onclick="doAnswer()">СОЗДАТЬ ANSWER</button>
                </div>
                <button class="btn btn-primary" style="margin-top:10px; background:#fff; color:#000;" onclick="doConnect()">ПОДКЛЮЧИТЬ ANSWER</button>
                <div id="status-text" style="text-align:center; font-size:12px; margin-top:15px; color:yellow;">Ожидание...</div>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen hidden">
        <header>
            <div><span class="status-dot" id="status-dot"></span><span id="chat-partner-name">Чат</span></div>
            <div style="display: flex; gap: 5px; align-items: center;">
                <button class="call-btn" id="call-trigger">📞</button>
                <button class="btn-secondary" style="padding:5px 8px; border-radius:8px; font-size:11px;" onclick="clearMyHistory()">Очистить</button>
                <button class="btn-secondary" style="padding:5px 8px; border-radius:8px; font-size:11px;" onclick="closeConnection()">Выход</button>
            </div>
        </header>
        <div id="chat-messages"></div>
        <div id="file-progress-container"><div id="file-progress-bar"></div></div>
        <div class="chat-input-bar">
            <label style="cursor:pointer; font-size:20px;">📎<input type="file" id="media-input" hidden onchange="handleMedia()"></label>
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button class="voice-btn" id="voice-btn">🎤</button>
            <button onclick="handleSendText()" style="background:none; border:none; color:var(--primary); font-size:24px;">➡️</button>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

<script>
    const $ = id => document.getElementById(id);
    let pc, dataChannel, myNick = localStorage.getItem('pg_nick');
    let history = JSON.parse(localStorage.getItem('pg_history') || '[]');
    let incomingChunks = {}, currentFileMeta = null;
    let mediaRecorder, audioChunks = [];

    window.onload = () => {
        if (!myNick) showScreen('screen-nick');
        else showScreen('screen-connect');
        initRTC();
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        $(id).classList.remove('hidden');
    }

    function initRTC() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        
        pc.ontrack = e => {
            if (e.streams[0]) $('remote-audio').srcObject = e.streams[0];
        };

        pc.ondatachannel = e => setupChannel(e.channel);
        
        pc.onicecandidate = e => {
            if (!e.candidate && pc.localDescription) {
                const sdp = btoa(JSON.stringify(pc.localDescription));
                if (pc.localDescription.type === 'offer') $('sdp-offer').value = sdp;
                else $('sdp-answer').value = sdp;
                $('status-text').innerText = "Код готов!";
            }
        };
    }

    function handleSaveNick() {
        const n = $('nick-input').value.trim();
        if (n) { localStorage.setItem('pg_nick', n); myNick = n; showScreen('screen-connect'); }
    }

    function clearNick() { localStorage.clear(); location.reload(); }

    async function doOffer() {
        try {
            dataChannel = pc.createDataChannel("chat");
            setupChannel(dataChannel);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
        } catch(e) { alert(e.message); }
    }

    async function doAnswer() {
        const o = $('sdp-offer').value.trim();
        if (!o) return alert("Вставьте Offer!");
        try {
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(o))));
            const a = await pc.createAnswer();
            await pc.setLocalDescription(a);
        } catch(e) { alert("Ошибка в коде Offer"); }
    }

    async function doConnect() {
        const a = $('sdp-answer').value.trim();
        if (!a) return alert("Вставьте Answer!");
        try {
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(a))));
        } catch(e) { alert("Ошибка в коде Answer"); }
    }

    function setupChannel(chan) {
        dataChannel = chan;
        dataChannel.binaryType = 'arraybuffer';

        dataChannel.onopen = () => {
            $('status-dot').style.background = 'var(--primary)';
            showScreen('screen-chat');
            renderHistory();
            dataChannel.send(JSON.stringify({type:'nick', val: myNick}));
        };

        dataChannel.onmessage = e => {
            if (typeof e.data === 'string') {
                const d = JSON.parse(e.data);
                if (d.type === 'nick') $('chat-partner-name').innerText = d.val;
                else if (d.type === 'file-start') {
                    currentFileMeta = d;
                    incomingChunks[d.name] = [];
                } else if (d.type === 'file-end') {
                    const blob = new Blob(incomingChunks[d.name], { type: d.mime });
                    saveMsg(URL.createObjectURL(blob), 'partner', d.fileType, d.name);
                    delete incomingChunks[d.name];
                } else {
                    saveMsg(d.content, 'partner', d.type, d.name);
                }
            } else if (currentFileMeta) {
                incomingChunks[currentFileMeta.name].push(e.data);
            }
        };

        dataChannel.onclose = () => {
            alert("Соединение разорвано.");
            location.reload();
        };
    }

    // --- ЗВОНКИ ---
    $('call-trigger').onclick = async () => {
        try {
            // Если navigator.mediaDevices отсутствует, это значит файл открыт локально
            if (!navigator.mediaDevices) throw new Error("Браузер блокирует доступ (требуется HTTPS)");
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => pc.addTrack(track, stream));
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            alert("Вызов начат. Отправьте новый Offer другу.");
        } catch(e) { 
            alert("Микрофон недоступен: " + e.message); 
        }
    };

    // --- ГОЛОСОВЫЕ ---
    const startRecord = async () => {
        try {
            if (!navigator.mediaDevices) throw new Error("Требуется HTTPS");
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                sendFile(new File([blob], "voice_msg.ogg", {type: 'audio/ogg'}), 'audio');
            };
            mediaRecorder.start();
            $('voice-btn').classList.add('recording');
        } catch(e) { 
            alert("Ошибка микрофона: " + e.message + "\nОткройте чат через защищенное соединение (https)."); 
        }
    };

    const stopRecord = () => {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
            $('voice-btn').classList.remove('recording');
        }
    };

    $('voice-btn').addEventListener('mousedown', startRecord);
    $('voice-btn').addEventListener('mouseup', stopRecord);
    $('voice-btn').addEventListener('touchstart', (e) => { e.preventDefault(); startRecord(); });
    $('voice-btn').addEventListener('touchend', stopRecord);

    // --- ФАЙЛЫ ---
    async function handleMedia() {
        const file = $('media-input').files[0];
        if (file) sendFile(file, file.type.startsWith('video') ? 'video' : 'image');
    }

    async function sendFile(file, fileType) {
        if (!dataChannel || dataChannel.readyState !== "open") return;
        if (file.size > 100 * 1024 * 1024) return alert("Файл слишком большой (макс 100МБ)");

        $('file-progress-container').style.display = 'block';
        const chunkSize = 16384;
        dataChannel.send(JSON.stringify({type: 'file-start', name: file.name, mime: file.type, fileType: fileType}));

        const buffer = await file.arrayBuffer();
        for (let i = 0; i < buffer.byteLength; i += chunkSize) {
            dataChannel.send(buffer.slice(i, i + chunkSize));
            $('file-progress-bar').style.width = ((i / buffer.byteLength) * 100) + '%';
        }

        dataChannel.send(JSON.stringify({type: 'file-end', name: file.name, fileType: fileType}));
        $('file-progress-container').style.display = 'none';
        $('file-progress-bar').style.width = '0%';
        saveMsg(URL.createObjectURL(file), 'me', fileType, file.name);
    }

    function handleSendText() {
        const val = $('msg-input').value.trim();
        if (val && dataChannel?.readyState === "open") {
            dataChannel.send(JSON.stringify({type:'text', content: val}));
            saveMsg(val, 'me', 'text');
            $('msg-input').value = "";
        }
    }

    function saveMsg(content, side, type, name = '') {
        const msg = { content, side, type, name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
        if (type === 'text' || (typeof content === 'string' && content.length < 1000000)) {
            history.push(msg);
            if (history.length > 50) history.shift();
            try { localStorage.setItem('pg_history', JSON.stringify(history)); } catch(e) {}
        }
        renderMsg(msg);
    }

    function renderMsg(m) {
        const div = document.createElement('div');
        div.className = `bubble ${m.side}`;
        let inner = m.type === 'text' ? `<div>${m.content}</div>` : '';
        
        if (m.type === 'image') {
            inner = `<img src="${m.content}" class="media-content">`;
            inner += `<a href="${m.content}" download="${m.name || 'img.jpg'}" class="download-link">Скачать фото</a>`;
        } else if (m.type === 'video') {
            inner = `<video src="${m.content}" controls class="media-content"></video>`;
            inner += `<a href="${m.content}" download="${m.name || 'video.mp4'}" class="download-link">Скачать видео</a>`;
        } else if (m.type === 'audio') {
            inner = `<audio src="${m.content}" controls style="width:100%; margin-top:8px;"></audio>`;
        }
        
        div.innerHTML = inner + `<div style="font-size:9px; opacity:0.5; text-align:right; margin-top:4px;">${m.time}</div>`;
        $('chat-messages').appendChild(div);
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
    }

    function renderHistory() {
        $('chat-messages').innerHTML = "";
        history.forEach(renderMsg);
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
    }

    // ВОЗВРАЩЕННАЯ ФУНКЦИЯ ОЧИСТКИ ИСТОРИИ
    function clearMyHistory() {
        if (confirm("Удалить историю у себя?")) {
            history = [];
            localStorage.removeItem('pg_history');
            renderHistory();
        }
    }

    function closeConnection() {
        if (confirm("Выйти и очистить историю?")) { localStorage.clear(); location.reload(); }
    }

    $('msg-input').onkeypress = e => e.key === 'Enter' && handleSendText();
</script>
</body>
</html>
